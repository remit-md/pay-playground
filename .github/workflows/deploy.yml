name: Deploy

concurrency:
  group: deploy-playground
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build playground
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: remit-md/pay-sdk
          path: _sdk

      - uses: pnpm/action-setup@v4
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SDK
        run: cd _sdk/typescript && pnpm install && pnpm tsc

      - name: Patch SDK path
        run: sed -i 's|file:../sdk/typescript|file:_sdk/typescript|' package.json

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm vite build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: playground-dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: playground-dist
          path: dist/

      - name: Deploy static files
        run: |
          mkdir -p /var/www/pay/playground
          rsync -az --delete dist/ /var/www/pay/playground/
          ls /var/www/pay/playground/index.html && echo "--- production deploy OK"
