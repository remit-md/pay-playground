name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkout the SDK repo alongside (playground depends on it via file: link)
      - uses: actions/checkout@v4
        with:
          repository: remit-md/pay-sdk
          path: ../sdk

      # Build SDK TypeScript dist (playground imports from it)
      - uses: pnpm/action-setup@v4
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            ../sdk/typescript/pnpm-lock.yaml

      - name: Build SDK
        run: cd ../sdk/typescript && pnpm install --frozen-lockfile && pnpm tsc

      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm tsc --noEmit
      - name: Build
        run: pnpm vite build
