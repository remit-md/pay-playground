name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkout the SDK repo inside workspace (playground depends on it via file: link)
      - uses: actions/checkout@v4
        with:
          repository: remit-md/pay-sdk
          path: _sdk

      - uses: pnpm/action-setup@v4
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build SDK TypeScript dist
      - name: Build SDK
        run: cd _sdk/typescript && pnpm install && pnpm tsc

      # Point playground's file: dep to the local SDK checkout
      - name: Patch SDK path
        run: sed -i 's|file:../sdk/typescript|file:_sdk/typescript|' package.json

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm vite build
